<!DOCTYPE html>
<html>
<head>
    <title>Add Item - YieldGuard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a202c; color: #e2e8f0; min-height: 100vh; }
        
        .navbar { background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%); padding: 15px 0; border-bottom: 1px solid #27ae60; position: sticky; top: 0; z-index: 1000; }
        .nav-container { max-width: 1400px; margin: 0 auto; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #27ae60 0%, #229954 100%); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .logo-text { color: #27ae60; font-size: 20px; font-weight: bold; }
        .nav-links { display: flex; gap: 10px; align-items: center; }
        .nav-links a { color: #e2e8f0; text-decoration: none; font-weight: 500; padding: 8px 14px; border-radius: 8px; transition: all 0.3s; font-size: 14px; }
        .nav-links a:hover { background: rgba(39, 174, 96, 0.1); color: #27ae60; }
        
        .hamburger { display: none; flex-direction: column; gap: 4px; cursor: pointer; padding: 10px; border: none; background: none; }
        .hamburger span { width: 25px; height: 3px; background: #27ae60; border-radius: 2px; }
        
        .mobile-menu { display: none; position: fixed; top: 70px; left: 0; right: 0; background: #1a202c; padding: 20px; border-bottom: 2px solid #27ae60; flex-direction: column; gap: 10px; z-index: 999; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .mobile-menu.active { display: flex; }
        .mobile-menu a { color: #e2e8f0; text-decoration: none; font-weight: 500; padding: 15px 20px; border-radius: 10px; font-size: 16px; border: 1px solid #374151; }
        .mobile-menu a:hover, .mobile-menu a.active { background: rgba(39, 174, 96, 0.1); color: #27ae60; border-color: #27ae60; }
        
        .container { max-width: 700px; margin: 20px auto; padding: 0 15px; }
        
        .form-card { background: linear-gradient(135deg, #2d3748 0%, #374151 100%); padding: 25px 20px; border-radius: 12px; border: 1px solid #4a5568; }
        .form-header { margin-bottom: 25px; }
        .form-header h1 { color: #27ae60; font-size: 24px; margin-bottom: 8px; }
        .form-header p { color: #a0aec0; font-size: 14px; }
        
        .form-group { margin-bottom: 20px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #cbd5e0; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select { width: 100%; padding: 12px 14px; background: #1a202c; border: 1px solid #4a5568; border-radius: 8px; color: #e2e8f0; font-size: 15px; transition: all 0.3s; }
        input:focus, select:focus { outline: none; border-color: #27ae60; box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.1); }
        
        .btn { display: inline-block; padding: 14px 24px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 15px; transition: all 0.3s; cursor: pointer; border: none; text-align: center; }
        .btn-primary { background: linear-gradient(135deg, #27ae60 0%, #229954 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); }
        .btn-secondary { background: #374151; color: #e2e8f0; border: 1px solid #4a5568; }
        
        .form-actions { display: flex; gap: 12px; margin-top: 25px; }
        .form-actions .btn { flex: 1; }
        .helper-text { font-size: 12px; color: #a0aec0; margin-top: 4px; }
        
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hamburger { display: flex; }
            .logo-text { font-size: 18px; }
            .form-row { grid-template-columns: 1fr; gap: 20px; }
            .form-card { padding: 20px 15px; }
            .form-actions { flex-direction: column; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <div class="logo-icon">🍳</div>
                <div class="logo-text">YieldGuard</div>
            </a>
            <div class="nav-links">
                <a href="/">Dashboard</a>
                <a href="/inventory">Inventory</a>
                <a href="/recipes">Recipes</a>
                <a href="/alerts">Alerts</a>
                <a href="/billing">Billing</a>
                <a href="/logout">Logout</a>
            </div>
            <button class="hamburger" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
        </div>
        <div class="mobile-menu" id="mobileMenu">
            <a href="/">📊 Dashboard</a>
            <a href="/inventory">📦 Inventory</a>
            <a href="/recipes">🍽️ Recipes</a>
            <a href="/alerts">⚠️ Alerts</a>
            <a href="/billing">💳 Billing</a>
            <a href="/logout">🚪 Logout</a>
        </div>
    </nav>
    
    <div class="container">
        <div class="form-card">
            <div class="form-header">
                <h1>➕ Add New Item</h1>
                <p>Add a new item to your inventory</p>
            </div>
            
            <form method="POST">
                <div class="form-group">
                    <label>Item Name *</label>
                    <input type="text" name="name" placeholder="e.g., Chicken Breast" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Category *</label>
                        <select name="category" required>
                            <option value="">Select...</option>
                            <option value="Protein">Protein</option>
                            <option value="Vegetables">Vegetables</option>
                            <option value="Dairy">Dairy</option>
                            <option value="Dry Goods">Dry Goods</option>
                            <option value="Beverages">Beverages</option>
                            <option value="Cleaning">Cleaning</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Unit *</label>
                        <select name="unit" required>
                            <option value="">Select...</option>
                            <option value="kg">kg</option>
                            <option value="g">g</option>
                            <option value="L">L</option>
                            <option value="ml">ml</option>
                            <option value="pieces">pieces</option>
                            <option value="boxes">boxes</option>
                            <option value="cans">cans</option>
                            <option value="bottles">bottles</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Current Stock *</label>
                        <input type="number" name="stock" step="0.01" placeholder="0.00" required>
                        <p class="helper-text">How much you have now</p>
                    </div>
                    
                    <div class="form-group">
                        <label>Reorder Point *</label>
                        <input type="number" name="reorder" step="0.01" placeholder="0.00" required>
                        <p class="helper-text">Alert when below</p>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Cost per Unit (£) *</label>
                    <input type="number" name="cost" step="0.01" placeholder="0.00" required>
                    <p class="helper-text">e.g., £8.50 per kg</p>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Add Item</button>
                    <a href="/inventory" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        function toggleMenu() {
            document.getElementById('mobileMenu').classList.toggle('active');
        }
        document.addEventListener('click', function(event) {
            const menu = document.getElementById('mobileMenu');
            const hamburger = document.querySelector('.hamburger');
            if (!menu.contains(event.target) && !hamburger.contains(event.target)) {
                menu.classList.remove('active');
            }
        });
    </script>
</body>
</html>
